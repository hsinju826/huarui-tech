<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Sign - 雲端電子簽署系統</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --success-hover: #15803d;
            --danger: #dc2626;
            --danger-bg: rgba(220, 38, 38, 0.08);
            --dark: #0f172a;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-500: #64748b;
            --gray-700: #334155;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius: 10px;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0; padding: 0; background-color: #f8fafc; color: var(--dark); -webkit-font-smoothing: antialiased;
        }

        /* 導覽列與工具列 */
        header {
            background-color: var(--dark); color: white; padding: 12px 24px;
            display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-md);
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 24px; height: 24px; background: var(--primary); border-radius: 6px; display: inline-block; }
        .logo-text { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }

        .toolbar {
            background: white; margin: 16px; padding: 12px 20px; border-radius: var(--radius);
            box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200);
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between;
        }
        
        .btn-group { display: flex; gap: 8px; align-items: center; }
        
        /* 專業級按鈕樣式 */
        button {
            background-color: var(--primary); color: white; border: none; 
            padding: 10px 18px; border-radius: 6px; cursor: pointer; 
            font-weight: 600; font-size: 14px; transition: all 0.2s ease;
            display: inline-flex; align-items: center; gap: 6px; box-shadow: var(--shadow-sm);
        }
        button:hover { background-color: var(--primary-hover); transform: translateY(-0.5px); }
        button:active { transform: translateY(0px); }
        button:disabled { background-color: var(--gray-200); color: var(--gray-500); cursor: not-allowed; transform: none; box-shadow: none; }
        button.secondary { background-color: white; color: var(--gray-700); border: 1px solid var(--gray-200); }
        button.secondary:hover { background-color: var(--gray-100); }
        button.success { background-color: var(--success); }
        button.success:hover { background-color: var(--success-hover); }

        .page-indicator { font-size: 14px; font-weight: 600; color: var(--gray-700); min-width: 80px; text-align: center; }

        /* 引導提示欄 */
        .instruction-banner {
            margin: 0 16px 16px 16px; padding: 12px 16px; background-color: #eff6ff;
            border-left: 4px solid var(--primary); border-radius: 4px; font-size: 13px; color: #1e40af; line-height: 1.5;
        }

        /* 工作區與 PDF 渲染面板 */
        .workspace {
            margin: 0 16px 24px 16px; background: var(--gray-100); border-radius: var(--radius);
            padding: 24px; display: flex; justify-content: center; overflow: auto;
            border: 1px dashed var(--gray-200); max-height: 70vh; min-height: 500px; box-sizing: border-box;
        }
        #pdf-wrapper { position: relative; box-shadow: var(--shadow-lg); background: white; border-radius: 4px; overflow: hidden; }
        #pdf-canvas { display: block; }

        /* 簽名拖曳框 - 強化辨識度與霓虹外框 */
        .draggable-signature {
            position: absolute; left: 0; top: 0; width: 150px; height: 60px;
            border: 2px dashed var(--primary); background: rgba(37, 99, 235, 0.08);
            cursor: move; touch-action: none; display: none; z-index: 10;
            box-sizing: border-box; transition: box-shadow 0.2s ease;
        }
        .draggable-signature:hover { box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15); border-style: solid; }
        .draggable-signature img { width: 100%; height: 100%; pointer-events: none; user-select: none; }
        
        /* 縮放手柄點綴 */
        .draggable-signature::after {
            content: ''; position: absolute; right: -4px; bottom: -4px; width: 10px; height: 10px;
            background: var(--primary); border-radius: 50%; border: 2px solid white; cursor: se-resize;
        }

        /* 簽名板彈窗 - 現代毛玻璃濾鏡 */
        .modal-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; z-index: 100; display: none; 
        }
        .modal-content { 
            background: white; padding: 24px; border-radius: var(--radius); 
            width: 90%; max-width: 480px; box-shadow: var(--shadow-lg); border: 1px solid var(--gray-200);
        }
        .modal-content h3 { margin-top: 0; font-size: 18px; color: var(--dark); font-weight: 700; }
        .sig-canvas-wrapper { 
            border: 1px solid var(--gray-200); background: #fafafa; 
            margin: 18px 0; border-radius: 6px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        #signature-canvas { width: 100%; height: 240px; display: block; cursor: crosshair; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <div class="logo-icon"></div>
        <div class="logo-text">Enterprise Sign</div>
    </div>
</header>

<div class="toolbar">
    <div class="btn-group">
        <input type="file" id="file-input" accept="application/pdf" style="display: none;" />
        <button id="upload-btn" class="secondary" onclick="document.getElementById('file-input').click()">
            📄 更換合約文件
        </button>
        <button id="open-sig-btn" disabled>
            ✍️ 點擊開始簽名
        </button>
    </div>
    
    <div class="btn-group" id="pagination-controls" style="display: none;">
        <button id="prev-page-btn" class="secondary">◀</button>
        <span id="page-num-display" class="page-indicator">第 1 / 1 頁</span>
        <button id="next-page-btn" class="secondary">▶</button>
    </div>

    <button id="download-pdf-btn" class="success" disabled>
        💾 儲存並導出文件
    </button>
</div>

<div class="instruction-banner">
    <strong>💡 簽署三步驟：</strong> 1. 點擊「開始簽名」建立您的手寫簽章。 2. 簽名完成後，在畫面上<strong>拖曳、放大縮小</strong>藍色虛線框至合約指定欄位。 3. 確認無誤後點擊「儲存並導出文件」，並將產出的 PDF 檔案傳回即可。
</div>

<div class="workspace">
    <div id="pdf-wrapper">
        <canvas id="pdf-canvas"></canvas>
        <div id="drag-sig" class="draggable-signature">
            <img id="sig-preview-img" src="" alt="Signature">
        </div>
    </div>
</div>

<div class="modal-overlay" id="sig-modal">
    <div class="modal-content">
        <h3>請在下方空白區域簽名</h3>
        <div class="sig-canvas-wrapper">
            <canvas id="signature-canvas"></canvas>
        </div>
        <div class="btn-group" style="justify-content: flex-end; width: 100%;">
            <button class="secondary" id="clear-sig-btn">清除重寫</button>
            <button class="secondary" id="close-modal-btn" style="color: var(--danger); background: var(--danger-bg); border: none;">取消</button>
            <button id="save-sig-btn">確認簽章</button>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfRawBytes = null, pdfDoc = null, currentPageNum = 1, totalPages = 1;
    let sigPosition = { x: 0, y: 0, width: 140, height: 55 }, signaturePad = null, signatureImgBase64 = null;

    const fileInput = document.getElementById('file-input');
    const openSigBtn = document.getElementById('open-sig-btn');
    const downloadPdfBtn = document.getElementById('download-pdf-btn');
    const pdfCanvas = document.getElementById('pdf-canvas');
    const pdfWrapper = document.getElementById('pdf-wrapper');
    const dragSig = document.getElementById('drag-sig');
    const sigPreviewImg = document.getElementById('sig-preview-img');
    const sigModal = document.getElementById('sig-modal');
    const signatureCanvas = document.getElementById('signature-canvas');

    // 自動化功能：如果網頁目錄下有放置 contract.pdf，一開網頁會自動加載！
    window.addEventListener('DOMContentLoaded', async () => {
        try {
            const response = await fetch('contract.pdf');
            if (response.ok) {
                const arrayBuffer = await response.arrayBuffer();
                loadPDFBytes(new Uint8Array(arrayBuffer));
                console.log("已自動載入預設合約 contract.pdf");
            }
        } catch (e) {
            console.log("未偵測到預設 contract.pdf，等待使用者手動載入。");
        }
    });

    // 處理手寫檔案載入
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function() { loadPDFBytes(new Uint8Array(this.result)); };
        reader.readAsArrayBuffer(file);
    });

    async function loadPDFBytes(bytes) {
        pdfRawBytes = bytes;
        pdfDoc = await pdfjsLib.getDocument({ data: pdfRawBytes }).promise;
        totalPages = pdfDoc.numPages;
        currentPageNum = 1;
        document.getElementById('pagination-controls').style.display = 'flex';
        openSigBtn.disabled = false;
        renderPDFPage(currentPageNum);
    }

    // 1:1 鎖定高精度渲染
    async function renderPDFPage(pageNum) {
        if (!pdfDoc) return;
        const page = await pdfDoc.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1.5 });
        
        pdfCanvas.width = viewport.width;
        pdfCanvas.height = viewport.height;
        pdfCanvas.style.width = viewport.width + 'px';
        pdfCanvas.style.height = viewport.height + 'px';
        pdfWrapper.style.width = viewport.width + 'px';
        pdfWrapper.style.height = viewport.height + 'px';

        await page.render({ canvasContext: pdfCanvas.getContext('2d'), viewport: viewport }).promise;
        document.getElementById('page-num-display').innerText = `第 ${pageNum} / ${totalPages} 頁`;
        
        if (signatureImgBase64) {
            applyTransform(dragSig, sigPosition.x, sigPosition.y, sigPosition.width, sigPosition.height);
        }
    }

    document.getElementById('prev-page-btn').addEventListener('click', () => { if (currentPageNum <= 1) return; currentPageNum--; renderPDFPage(currentPageNum); });
    document.getElementById('next-page-btn').addEventListener('click', () => { if (currentPageNum >= totalPages) return; currentPageNum++; renderPDFPage(currentPageNum); });

    // 簽名板交互控制
    openSigBtn.addEventListener('click', () => {
        sigModal.style.display = 'flex';
        if (!signaturePad) {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            signatureCanvas.width = signatureCanvas.offsetWidth * ratio;
            signatureCanvas.height = signatureCanvas.offsetHeight * ratio;
            signatureCanvas.getContext("2d").scale(ratio, ratio);
            signaturePad = new SignaturePad(signatureCanvas, { 
                backgroundColor: 'rgba(255, 255, 255, 0)',
                penColor: '#0f172a' // 使用深色質感的墨水色
            });
        } else {
            signaturePad.clear();
        }
    });

    document.getElementById('clear-sig-btn').addEventListener('click', () => signaturePad.clear());
    document.getElementById('close-modal-btn').addEventListener('click', () => sigModal.style.display = 'none');
    
    document.getElementById('save-sig-btn').addEventListener('click', () => {
        if (signaturePad.isEmpty()) { alert('請先簽名！'); return; }
        signatureImgBase64 = signaturePad.toDataURL('image/png');
        sigPreviewImg.src = signatureImgBase64;
        
        dragSig.style.display = 'block';
        // 預設將簽名框生成於可視範圍左上角稍微偏移
        sigPosition = { x: 20, y: 20, width: 140, height: 55 };
        applyTransform(dragSig, sigPosition.x, sigPosition.y, sigPosition.width, sigPosition.height);
        
        sigModal.style.display = 'none';
        downloadPdfBtn.disabled = false;
    });

    function applyTransform(target, x, y, w, h) {
        target.style.transform = `translate(${x}px, ${y}px)`;
        target.style.width = w + 'px';
        target.style.height = h + 'px';
    }

    // Interact.js 專業手勢拖曳與多點觸控縮放
    interact('#drag-sig').resizable({
        edges: { left: true, right: true, bottom: true, top: true },
        listeners: { move(event) {
            let { x, y } = sigPosition;
            x += event.deltaRect.left; y += event.deltaRect.top;
            sigPosition = { x, y, width: event.rect.width, height: event.rect.height };
            applyTransform(event.target, x, y, event.rect.width, event.rect.height);
        }},
        modifiers: [interact.modifiers.restrictEdges({ outer: 'parent' }), interact.modifiers.restrictSize({ min: { width: 50, height: 20 } })]
    }).draggable({
        listeners: { move(event) {
            sigPosition.x += event.dx; sigPosition.y += event.dy;
            applyTransform(event.target, sigPosition.x, sigPosition.y, sigPosition.width, sigPosition.height);
        }},
        modifiers: [interact.modifiers.restrictRect({ restriction: 'parent' })]
    });

    // 高相容性 Canvas 壓印與合併下載
    downloadPdfBtn.addEventListener('click', async () => {
        if (!pdfRawBytes || !signatureImgBase64) return;

        try {
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = pdfCanvas.width;
            exportCanvas.height = pdfCanvas.height;
            const ctx = exportCanvas.getContext('2d');

            ctx.drawImage(pdfCanvas, 0, 0);

            const img = new Image();
            img.src = signatureImgBase64;
            await new Promise((resolve) => { img.onload = resolve; });

            ctx.drawImage(img, sigPosition.x, sigPosition.y, sigPosition.width, sigPosition.height);
            const mergedImgData = exportCanvas.toDataURL('image/jpeg', 0.95);

            const targetPdfDoc = await PDFLib.PDFDocument.create();
            const page = targetPdfDoc.addPage([pdfCanvas.width, pdfCanvas.height]);
            
            const embeddedImg = await targetPdfDoc.embedJpg(mergedImgData);
            page.drawImage(embeddedImg, { x: 0, y: 0, width: pdfCanvas.width, height: pdfCanvas.height });

            const modifiedPdfBytes = await targetPdfDoc.save();
            const blob = new Blob([modifiedPdfBytes], { type: "application/pdf" });
            const downloadUrl = URL.createObjectURL(blob);
            
            const tempLink = document.createElement('a');
            tempLink.href = downloadUrl;
            tempLink.download = "已簽署文件.pdf";
            document.body.appendChild(tempLink);
            tempLink.click();
            document.body.removeChild(tempLink);

        } catch (err) {
            console.error(err);
            alert("導出失敗，請確認檔案。");
        }
    });
</script>
</body>
</html>
